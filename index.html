<html lang="th">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>POSN Tutor - Teng Neung</title>

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --math-color: #f59e0b;
            --comp-color: #10b981;
            --bg: #f8fafc;
            --text: #1e293b;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0; 
            padding: 15px;
            padding-bottom: 80px; 
        }
        .container { max-width: 600px; margin: auto; }
        
        header { 
            /* ทำให้ Header ลอยติดขอบบนและโปร่งแสงนิดๆ */
            position: sticky;
            top: 10px;
            z-index: 100;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.95), rgba(29, 78, 216, 0.95));
            backdrop-filter: blur(8px);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
        }

        .stats-bar {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-weight: bold;
        }

        /* ตกแต่ง Progress Bar */
        .progress-container {
            width: 100%;
            background-color: #e2e8f0;
            border-radius: 10px;
            margin-top: 10px;
            height: 12px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--comp-color));
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
        }

        .motivation {
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 10px;
            font-weight: normal;
        }

        .week-card { 
            background: white; 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 25px; 
            border-left: 5px solid var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .week-header { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; color: var(--primary); }

        .day-box { 
            background: #f1f5f9;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            transition: all 0.3s ease; /* เพิ่ม Transition เวลากดหรือ Hover */
            border: 1px solid transparent;
        }
        .day-box:hover {
            transform: translateX(4px);
            border-color: #cbd5e1;
            box-shadow: -2px 4px 8px rgba(0,0,0,0.05);
        }

        .day-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .date-label { font-weight: bold; font-size: 0.9rem; }
        
        .tag { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; color: white; font-weight: bold; }
        .tag-math { background: var(--math-color); }
        .tag-comp { background: var(--comp-color); }
        .tag-rest { background: #94a3b8; }

        .note-input {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 10px;
            font-family: inherit;
            font-size: 0.85rem;
            margin-top: 8px;
            resize: none;
            transition: border-color 0.2s;
        }
        .note-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .check-wrapper { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; margin-top: 8px; cursor: pointer; user-select: none; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: var(--comp-color); }

        /* การทำไฮไลท์เมื่อติ๊กแล้ว */
        .done { 
            opacity: 0.7; 
            background: #e2e8f0; 
            border-left: 4px solid var(--comp-color);
        }

        .footer-info { text-align: center; color: #64748b; font-size: 0.8rem; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0">POSN Study Roadmap 💻</h2>
        <small style="opacity: 0.9;">Teng Neung's Learning Journey</small>
    </header>

    <div class="stats-bar">
        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <span>Progress: <span id="progress-text" style="color:var(--primary)">0%</span></span>
            <span><span id="days-count">0</span> Days Completed</span>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="motivation" id="motivation-text">ก้าวแรกสำคัญที่สุด เริ่มลุยกันเลย! 🔥</div>
    </div>

    <div id="app-content"></div>

    <div class="footer-info">
        บันทึกข้อมูลอัตโนมัติในเครื่องของคุณ 💾<br>
        1 เม.ย. - 30 ส.ค. 2569
    </div>
</div>

<script>
    const startDate = new Date(2026, 3, 1); 
    const endDate = new Date(2026, 7, 30); 

    function initApp() {
        const content = document.getElementById('app-content');
        let current = new Date(startDate);
        let weekIdx = 1;

        while (current <= endDate) {
            let weekCard = document.createElement('div');
            weekCard.className = 'week-card';
            weekCard.innerHTML = `<div class="week-header">สัปดาห์ที่ ${weekIdx}</div>`;

            for (let d = 0; d < 7; d++) {
                if (current > endDate) break;

                const dayOfWeek = current.getDay(); 
                const isApril = current.getMonth() === 3;
                const dayDate = current.getDate();
                
                let hours = 0;
                if (isApril) {
                    hours = Math.min(2 + Math.floor(dayDate / 7), 5);
                } else {
                    hours = (dayOfWeek === 0 || dayOfWeek === 6) ? 0 : 3;
                }

                let subject = (weekIdx % 2 !== 0) ? "คณิตศาสตร์ 📐" : "คอมพิวเตอร์ 💻";
                let tagClass = (weekIdx % 2 !== 0) ? "tag-math" : "tag-comp";
                
                if (hours === 0) {
                    subject = "วันพักผ่อน ☕";
                    tagClass = "tag-rest";
                }

                const dateStr = current.toLocaleDateString('th-TH', { weekday: 'short', day: 'numeric', month: 'short' });
                const storageKey = `posn_${current.getTime()}`;

                // เปลี่ยน oninput เป็น onchange เพื่อลดภาระการเซฟข้อมูล
                const dayHtml = `
                    <div class="day-box" id="box-${storageKey}">
                        <div class="day-info">
                            <span class="date-label">${dateStr}</span>
                            <span class="tag ${tagClass}">${subject} ${hours > 0 ? '('+hours+' ชม.)' : ''}</span>
                        </div>
                        <label class="check-wrapper">
                            <input type="checkbox" id="chk-${storageKey}" onchange="updateData('${storageKey}', event)"> 
                            อ่านจบแล้ว
                        </label>
                        <textarea class="note-input" id="note-${storageKey}" 
                            placeholder="เพิ่มโน้ตหรือความเข้าใจในวันนี้..." 
                            onchange="updateNote('${storageKey}')"></textarea>
                    </div>
                `;
                weekCard.innerHTML += dayHtml;
                current.setDate(current.getDate() + 1);
            }
            content.appendChild(weekCard);
            weekIdx++;
        }
        loadData();
    }

    function updateNote(key) {
        const noteValue = document.getElementById(`note-${key}`).value;
        const data = JSON.parse(localStorage.getItem('posn_master') || '{}');
        if(!data[key]) data[key] = {};
        data[key].note = noteValue;
        localStorage.setItem('posn_master', JSON.stringify(data));
    }

    function updateData(key, event) {
        const isChecked = document.getElementById(`chk-${key}`).checked;
        const noteValue = document.getElementById(`note-${key}`).value;
        const box = document.getElementById(`box-${key}`);

        if(isChecked) {
            box.classList.add('done');
            // ยิงพลุเมื่อกดเช็คว่าอ่านจบ
            fireConfetti(event);
        } else {
            box.classList.remove('done');
        }

        const data = JSON.parse(localStorage.getItem('posn_master') || '{}');
        data[key] = { checked: isChecked, note: noteValue };
        localStorage.setItem('posn_master', JSON.stringify(data));
        calculateProgress();
    }

    function fireConfetti(event) {
        // หาตำแหน่งที่คลิกเพื่อยิงพลุออกมาจากตรงนั้น
        const rect = event.target.getBoundingClientRect();
        const x = (rect.left + (rect.width / 2)) / window.innerWidth;
        const y = (rect.top + (rect.height / 2)) / window.innerHeight;

        confetti({
            particleCount: 40,
            spread: 60,
            origin: { x: x, y: y },
            colors: ['#2563eb', '#10b981', '#f59e0b'],
            disableForReducedMotion: true
        });
    }

    function loadData() {
        const data = JSON.parse(localStorage.getItem('posn_master') || '{}');
        for (const key in data) {
            const chk = document.getElementById(`chk-${key}`);
            const note = document.getElementById(`note-${key}`);
            const box = document.getElementById(`box-${key}`);
            if (chk) {
                chk.checked = data[key].checked;
                note.value = data[key].note || "";
                if(data[key].checked) box.classList.add('done');
            }
        }
        calculateProgress();
    }

    function calculateProgress() {
        const checks = document.querySelectorAll('input[type="checkbox"]');
        const checked = document.querySelectorAll('input[type="checkbox"]:checked');
        const percent = checks.length > 0 ? Math.round((checked.length / checks.length) * 100) : 0;
        
        // อัปเดตตัวเลขและหลอดพลัง
        document.getElementById('progress-text').innerText = percent + '%';
        document.getElementById('days-count').innerText = checked.length + ' / ' + checks.length;
        document.getElementById('progress-bar').style.width = percent + '%';

        // เปลี่ยนข้อความให้กำลังใจตามความคืบหน้า
        const motivationEl = document.getElementById('motivation-text');
        if (percent === 0) motivationEl.innerText = "ก้าวแรกสำคัญที่สุด เริ่มลุยกันเลย! 🔥";
        else if (percent < 25) motivationEl.innerText = "เริ่มต้นได้สวย ทำต่อไปเรื่อยๆ นะ! 💪";
        else if (percent < 50) motivationEl.innerText = "มาได้เกือบครึ่งทางแล้ว ความพยายามไม่ทรยศใคร! 🚀";
        else if (percent < 75) motivationEl.innerText = "เกินครึ่งทางแล้ว! เป้าหมายอยู่ไม่ไกลเกินเอื้อม 🏆";
        else if (percent < 100) motivationEl.innerText = "โค้งสุดท้ายแล้ว สู้ๆ สบายมาก! ⚡";
        else motivationEl.innerText = "ยินดีด้วย! คุณพร้อมสำหรับสนามสอบแล้ว 🎉🎉🎉";
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            console.log('App Ready');
        });
    }

    initApp();
</script>

</body>
</html>
