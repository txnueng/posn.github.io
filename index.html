<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>POSN Tutor - Teng Neung</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* ตัวแปรสีสำหรับโหมดสว่าง (Default) */
        :root {
            --bg: #ffffff;
            --text: #000000;
            --border-color: #000000;
            --shadow-color: #000000;
            --done-bg: #f0f0f0;
            --done-text: #555555;
            --rest-bg: #e0e0e0;
        }

        /* ตัวแปรสีสำหรับโหมดมืด */
        [data-theme="dark"] {
            --bg: #0f0f0f;
            --text: #ffffff;
            --border-color: #ffffff;
            --shadow-color: #ffffff;
            --done-bg: #1a1a1a;
            --done-text: #aaaaaa;
            --rest-bg: #222222;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0; 
            padding: 20px;
            padding-bottom: 80px; 
            /* ลายจุดพื้นหลังที่เปลี่ยนสีตามโหมด */
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 20px 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container { max-width: 650px; margin: auto; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        header { 
            position: sticky;
            top: 15px;
            z-index: 100;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            border: 3px solid var(--border-color);
            box-shadow: 5px 5px 0px var(--shadow-color);
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        
        header h2 { margin: 0; font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        header small { font-weight: bold; background: var(--text); color: var(--bg); padding: 2px 8px; margin-top: 5px; display: inline-block; transition: all 0.3s ease;}

        /* ปุ่มสลับโหมด */
        .theme-btn {
            margin-top: 15px;
            background: var(--bg);
            color: var(--text);
            border: 2px solid var(--border-color);
            padding: 5px 15px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .theme-btn:hover {
            background: var(--text);
            color: var(--bg);
        }

        .stats-bar {
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            border: 3px solid var(--border-color);
            box-shadow: 5px 5px 0px var(--shadow-color);
            margin-bottom: 30px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .progress-container {
            width: 100%;
            border: 2px solid var(--border-color);
            background-color: var(--bg);
            margin-top: 12px;
            height: 20px;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            background: var(--text);
            width: 0%;
            transition: width 0.5s steps(20, end);
        }

        .motivation {
            text-align: right;
            font-size: 0.85rem;
            margin-top: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .week-card { 
            background: var(--bg); 
            border: 3px solid var(--border-color);
            box-shadow: 5px 5px 0px var(--shadow-color);
            padding: 20px; 
            margin-bottom: 30px; 
            transition: all 0.3s ease;
        }
        .week-header { 
            font-size: 1.2rem; 
            font-weight: 800; 
            margin-bottom: 15px; 
            border-bottom: 2px dashed var(--border-color);
            padding-bottom: 5px;
            text-transform: uppercase;
        }

        .day-box { 
            background: var(--bg);
            border: 2px solid var(--border-color);
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.2s ease;
            position: relative;
        }
        .day-box:hover {
            transform: translate(-3px, -3px);
            box-shadow: 4px 4px 0px var(--shadow-color);
        }

        .day-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;}
        .date-label { font-weight: 800; font-size: 1rem; }
        
        .tag { 
            padding: 2px 8px; 
            font-size: 0.8rem; 
            font-weight: 800;
            border: 2px solid var(--border-color);
            text-transform: uppercase;
        }
        .tag-math { background: var(--bg); color: var(--text); }
        .tag-comp { background: var(--text); color: var(--bg); }
        .tag-rest { background: var(--rest-bg); color: var(--text); border-style: dashed; }

        .note-input {
            width: 100%;
            border: 2px solid var(--border-color);
            background: var(--bg);
            color: var(--text);
            padding: 10px;
            font-family: 'JetBrains Mono', 'Sarabun', monospace;
            font-size: 0.9rem;
            margin-top: 10px;
            resize: vertical;
            min-height: 60px;
            transition: all 0.2s;
        }
        .note-input:focus {
            outline: none;
            background: var(--text);
            color: var(--bg);
        }

        .check-wrapper { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 1rem; 
            font-weight: 700;
            margin-top: 10px; 
            cursor: pointer; 
            user-select: none; 
        }
        
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-color);
            background: var(--bg);
            cursor: pointer;
            position: relative;
            transition: all 0.1s;
        }

        input[type="checkbox"]:checked {
            background: var(--text);
        }

        input[type="checkbox"]:checked::after {
            content: 'X';
            position: absolute;
            color: var(--bg);
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            font-size: 16px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .done { 
            background: var(--done-bg); 
            opacity: 0.8;
            border-style: dashed;
            box-shadow: none !important;
            transform: none !important;
        }
        .done .date-label, .done .check-wrapper {
            text-decoration: line-through;
            color: var(--done-text);
        }

        .footer-info { 
            text-align: center; 
            font-weight: bold;
            font-size: 0.9rem; 
            margin-top: 40px; 
            background: var(--text);
            color: var(--bg);
            padding: 15px;
            border: 3px solid var(--border-color);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 class="mono">POSN.exe</h2>
        <small class="mono">USER: TENG_NEUNG</small>
        <br>
        <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">[ THEME: LIGHT ]</button>
    </header>

    <div class="stats-bar mono">
        <div style="display: flex; justify-content: space-between; border-bottom: 2px solid var(--border-color); padding-bottom: 5px;">
            <span>STATUS: <span id="progress-text">0%</span></span>
            <span><span id="days-count">0</span> DAYS LOGGED</span>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="motivation" id="motivation-text">SYSTEM READY.</div>
    </div>

    <div id="app-content"></div>

    <div class="footer-info mono">
        > LOCAL_STORAGE_ACTIVE: TRUE<br>
        > TIMEFRAME: 01.04.2026 - 30.08.2026
    </div>
</div>

<script>
    const startDate = new Date(2026, 3, 1); 
    const endDate = new Date(2026, 7, 30); 

    // ระบบ Theme
    function initTheme() {
        const savedTheme = localStorage.getItem('posn_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeBtnText(savedTheme);
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('posn_theme', newTheme);
        updateThemeBtnText(newTheme);
    }

    function updateThemeBtnText(theme) {
        document.getElementById('themeToggle').innerText = theme === 'light' ? '[ THEME: LIGHT ]' : '[ THEME: DARK ]';
    }

    function initApp() {
        initTheme(); // โหลดธีมก่อนสร้าง UI
        
        const content = document.getElementById('app-content');
        let current = new Date(startDate);
        let weekIdx = 1;

        while (current <= endDate) {
            let weekCard = document.createElement('div');
            weekCard.className = 'week-card';
            weekCard.innerHTML = `<div class="week-header mono">WEEK_${String(weekIdx).padStart(2, '0')}</div>`;

            for (let d = 0; d < 7; d++) {
                if (current > endDate) break;

                const dayOfWeek = current.getDay(); 
                const isApril = current.getMonth() === 3;
                const dayDate = current.getDate();
                
                let hours = 0;
                if (isApril) {
                    hours = Math.min(2 + Math.floor(dayDate / 7), 5);
                } else {
                    hours = (dayOfWeek === 0 || dayOfWeek === 6) ? 0 : 3;
                }

                let subject = (weekIdx % 2 !== 0) ? "[ MATH ]" : "[ CODE ]";
                let tagClass = (weekIdx % 2 !== 0) ? "tag-math" : "tag-comp";
                
                if (hours === 0) {
                    subject = "[ REST ]";
                    tagClass = "tag-rest";
                }

                const dateStr = current.toLocaleDateString('en-CA'); 
                const displayDate = current.toLocaleDateString('th-TH', { weekday: 'short', day: '2-digit', month: 'short' });
                const storageKey = `posn_${current.getTime()}`;

                const dayHtml = `
                    <div class="day-box" id="box-${storageKey}">
                        <div class="day-info">
                            <span class="date-label mono">${dateStr} | ${displayDate}</span>
                            <span class="tag mono ${tagClass}">${subject} ${hours > 0 ? hours+'H' : ''}</span>
                        </div>
                        <label class="check-wrapper">
                            <input type="checkbox" id="chk-${storageKey}" onchange="updateData('${storageKey}', event)"> 
                            TASK_COMPLETED
                        </label>
                        <textarea class="note-input" id="note-${storageKey}" 
                            placeholder="> Input notes here..." 
                            onchange="updateNote('${storageKey}')"></textarea>
                    </div>
                `;
                weekCard.innerHTML += dayHtml;
                current.setDate(current.getDate() + 1);
            }
            content.appendChild(weekCard);
            weekIdx++;
        }
        loadData();
    }

    function updateNote(key) {
        const noteValue = document.getElementById(`note-${key}`).value;
        const data = JSON.parse(localStorage.getItem('posn_master') || '{}');
        if(!data[key]) data[key] = {};
        data[key].note = noteValue;
        localStorage.setItem('posn_master', JSON.stringify(data));
    }

    function updateData(key, event) {
        const isChecked = document.getElementById(`chk-${key}`).checked;
        const noteValue = document.getElementById(`note-${key}`).value;
        const box = document.getElementById(`box-${key}`);

        if(isChecked) {
            box.classList.add('done');
            fireMonochromeConfetti(event);
        } else {
            box.classList.remove('done');
        }

        const data = JSON.parse(localStorage.getItem('posn_master') || '{}');
        data[key] = { checked: isChecked, note: noteValue };
        localStorage.setItem('posn_master', JSON.stringify(data));
        calculateProgress();
    }

    function fireMonochromeConfetti(event) {
        const rect = event.target.getBoundingClientRect();
        const x = (rect.left + (rect.width / 2)) / window.innerWidth;
        const y = (rect.top + (rect.height / 2)) / window.innerHeight;

        confetti({
            particleCount: 50,
            spread: 70,
            origin: { x: x, y: y },
            colors: ['#000000', '#333333', '#888888', '#ffffff'], 
            shapes: ['square'], 
            disableForReducedMotion: true
        });
    }

    function loadData() {
        const data = JSON.parse(localStorage.getItem('posn_master') || '{}');
        for (const key in data) {
            const chk = document.getElementById(`chk-${key}`);
            const note = document.getElementById(`note-${key}`);
            const box = document.getElementById(`box-${key}`);
            if (chk) {
                chk.checked = data[key].checked;
                note.value = data[key].note || "";
                if(data[key].checked) box.classList.add('done');
            }
        }
        calculateProgress();
    }

    function calculateProgress() {
        const checks = document.querySelectorAll('input[type="checkbox"]');
        const checked = document.querySelectorAll('input[type="checkbox"]:checked');
        const percent = checks.length > 0 ? Math.round((checked.length / checks.length) * 100) : 0;
        
        document.getElementById('progress-text').innerText = percent + '%';
        document.getElementById('days-count').innerText = checked.length + ' / ' + checks.length;
        document.getElementById('progress-bar').style.width = percent + '%';

        const motivationEl = document.getElementById('motivation-text');
        if (percent === 0) motivationEl.innerText = "WAITING FOR INPUT...";
        else if (percent < 30) motivationEl.innerText = "PROCESSING...";
        else if (percent < 70) motivationEl.innerText = "COMPILING SKILLS...";
        else if (percent < 100) motivationEl.innerText = "EXECUTING FINAL PHASE...";
        else motivationEl.innerText = "ALL TASKS COMPLETED. READY FOR POSN.";
    }

    initApp();
</script>

</body>
</html>
